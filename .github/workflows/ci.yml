name: CI

# Keep CI available, but do not run it on every feature-branch/PR update.
# During active strategy-search development the branch can receive many small
# commits, and the Windows/Linux matrix is too noisy and expensive to trigger
# after every source edit. Run automatically only when code reaches long-lived
# branches, or start it manually from the Actions tab when needed.
on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINDGEN_EXTRA_CLANG_ARGS: "-D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Check + Test on Windows (primary dev platform)
  # ────────────────────────────────────────────────────────────────────────────
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-ci-

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Cargo check
        run: cargo check -p forex-app -p forex-core -p forex-news --no-default-features

      - name: Run app + core tests
        run: cargo test -p forex-app -p forex-core -p forex-news

  # ────────────────────────────────────────────────────────────────────────────
  # Check on Linux (catch cross-platform issues early)
  # ────────────────────────────────────────────────────────────────────────────
  check-linux:
    name: Check (Linux)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libasound2-dev libudev-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libx11-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-ci-

      - name: Cargo check (app + core)
        run: cargo check -p forex-app -p forex-core -p forex-news --no-default-features

      - name: Run app + core tests
        run: cargo test -p forex-app -p forex-core -p forex-news
