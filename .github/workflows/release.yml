name: Release (GPU)

# Builds the GPU-enabled release for Windows + Linux as a single artifact
# per platform. Uses libtorch (PyTorch C++) with CUDA, bundled inside the
# installer/tarball. End-users need a matching NVIDIA driver + CUDA
# toolkit installed on their machine; libtorch DLLs/.so are shipped
# in-tree so no extra Python install is needed.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0-alpha)'
        required: false
        default: 'v0.1.0-alpha'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINDGEN_EXTRA_CLANG_ARGS: "-D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"

  # libtorch / CUDA target. tch-rs 0.22 (our pinned version) requires
  # libtorch 2.9.0; PyTorch 2.9 was the first release to ship CUDA 13
  # binaries (cu130). The cu130 build is binary-compatible with any
  # CUDA 13.x runtime — including the user-installed CUDA 13.2 the
  # release is targeted at. Bump LIBTORCH_VERSION when tch-rs is
  # bumped (0.23 → libtorch 2.11; 0.24 → 2.12; etc.).
  LIBTORCH_VERSION: "2.9.0"
  LIBTORCH_CUDA: "cu130"
  # CUDA toolkit version installed on the build runner via Jimver/cuda-toolkit.
  # Must be >= the libtorch CUDA target above. Default: latest CUDA 13.x.
  CUDA_TOOLKIT_VERSION: "13.2.0"

  # Cargo features enabled in the release. Keep in sync with the
  # forex-app Cargo.toml `gpu` feature definition.
  RELEASE_FEATURES: "gpu"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Windows GPU release — NSIS installer + portable zip
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64-msvc, GPU)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Rust toolchain (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-cargo-gpu-${{ env.LIBTORCH_VERSION }}-${{ env.LIBTORCH_CUDA }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-gpu-${{ env.LIBTORCH_VERSION }}-${{ env.LIBTORCH_CUDA }}-
            windows-cargo-gpu-

      - name: Install CUDA toolkit (Windows)
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_TOOLKIT_VERSION }}
          method: 'network'
          sub-packages: '["nvcc", "cudart", "thrust", "cublas", "cusparse", "cusolver", "curand"]'

      - name: Download libtorch (Windows, CUDA)
        shell: pwsh
        run: |
          $url = "https://download.pytorch.org/libtorch/${env:LIBTORCH_CUDA}/libtorch-win-shared-with-deps-${env:LIBTORCH_VERSION}%2B${env:LIBTORCH_CUDA}.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile "libtorch.zip" -UseBasicParsing
          Expand-Archive -Path "libtorch.zip" -DestinationPath "$env:GITHUB_WORKSPACE" -Force
          Remove-Item "libtorch.zip"
          $libtorchPath = Join-Path $env:GITHUB_WORKSPACE "libtorch"
          echo "LIBTORCH=$libtorchPath" >> $env:GITHUB_ENV
          echo "LIBTORCH_INCLUDE=$libtorchPath/include" >> $env:GITHUB_ENV
          echo "LIBTORCH_LIB=$libtorchPath/lib" >> $env:GITHUB_ENV
          echo "$libtorchPath/lib" >> $env:GITHUB_PATH

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version "^0.11"

      - name: Build release binary (GPU)
        shell: pwsh
        run: |
          cargo build -p forex-app --release --no-default-features --features "${env:RELEASE_FEATURES}"

      - name: Stage native runtime DLLs
        # Stages every native runtime dependency next to the binary so the
        # NSIS packager and the portable zip both pick them up:
        #  - xgboost.dll / catboostmodel.dll: tree-model native bindings
        #  - libtorch *.dll: tch-rs runtime (CUDA + cuDNN bundled)
        shell: pwsh
        run: |
          $release = "target\release"
          # Tree-model bindings
          Copy-Item "$release\deps\xgboost.dll" "$release\xgboost.dll" -Force -ErrorAction SilentlyContinue
          if (Test-Path "$release\catboostmodel.dll") {
              Copy-Item "$release\catboostmodel.dll" "crates\forex-app\catboostmodel.dll" -Force
          }
          if (Test-Path "$release\xgboost.dll") {
              Copy-Item "$release\xgboost.dll" "crates\forex-app\xgboost.dll" -Force
          }
          # libtorch DLLs
          New-Item -ItemType Directory -Path "$release\libtorch" -Force | Out-Null
          Copy-Item "${env:LIBTORCH}\lib\*.dll" "$release\" -Force
          Copy-Item "${env:LIBTORCH}\lib\*.dll" "crates\forex-app\" -Force

      - name: Update packager resources to include libtorch
        shell: pwsh
        run: |
          $cargoToml = "crates\forex-app\Cargo.toml"
          $content = Get-Content $cargoToml -Raw
          # Replace the `resources = [...]` line to bundle every libtorch DLL too
          $libtorchDlls = (Get-ChildItem "${env:LIBTORCH}\lib\*.dll" | ForEach-Object { "`"$($_.Name)`"" }) -join ", "
          $newResources = "resources = [`"config.yaml`", `"catboostmodel.dll`", `"xgboost.dll`", $libtorchDlls]"
          $content = [regex]::Replace($content, 'resources = \[[^\]]*\]', $newResources)
          Set-Content $cargoToml $content -NoNewline

      - name: Package NSIS installer
        run: cargo packager --release -p forex-app --formats nsis
        env:
          NSIS_PLUGINS: "${{ runner.tool_cache }}\\nsis"

      - name: Cleanup staged DLLs from crate root
        shell: pwsh
        run: |
          Remove-Item "crates\forex-app\catboostmodel.dll" -ErrorAction SilentlyContinue
          Remove-Item "crates\forex-app\xgboost.dll"       -ErrorAction SilentlyContinue
          Remove-Item "crates\forex-app\*.dll"             -ErrorAction SilentlyContinue
          # Restore unmodified Cargo.toml so the cache key stays stable
          git checkout -- "crates\forex-app\Cargo.toml"

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name || inputs.version }}"
          $outDir = "dist\ForexAI-windows-x64-gpu"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Copy-Item "target\release\forex-app.exe" "$outDir\ForexAI.exe"
          Copy-Item "target\release\catboostmodel.dll" "$outDir\catboostmodel.dll" -ErrorAction SilentlyContinue
          Copy-Item "target\release\xgboost.dll"       "$outDir\xgboost.dll"       -ErrorAction SilentlyContinue
          Copy-Item "target\release\*.dll"             "$outDir\" -Force
          Copy-Item "config.yaml"                      "$outDir\config.yaml"
          # Drop a README so end users know what's bundled
          @"
          ForexAI $version (Windows, GPU)
          ================================

          Runtime requirements:
            - NVIDIA driver supporting CUDA 13.0 or newer (CUDA 13.2 recommended)
              -> verify with: nvidia-smi
            - The CUDA runtime DLLs bundled here cover libtorch; you do NOT
              need to install the CUDA toolkit separately.

          To run: just double-click ForexAI.exe (or run from a terminal
          for log output).

          Bundled libtorch: $(${env:LIBTORCH_VERSION})
          Bundled CUDA target: $(${env:LIBTORCH_CUDA})
          "@ | Set-Content "$outDir\README.txt"
          Compress-Archive -Path $outDir -DestinationPath "dist\ForexAI-$version-windows-x64-gpu.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-gpu
          path: |
            target/release/nsis/*.exe
            dist/*.zip
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Linux GPU release — .tar.gz portable bundle + .deb
  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64-gnu, GPU)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config curl unzip \
            libasound2-dev libudev-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxrandr-dev libxcursor-dev \
            libxi-dev libgl1-mesa-dev \
            dpkg-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-cargo-gpu-${{ env.LIBTORCH_VERSION }}-${{ env.LIBTORCH_CUDA }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-gpu-${{ env.LIBTORCH_VERSION }}-${{ env.LIBTORCH_CUDA }}-
            linux-cargo-gpu-

      - name: Install CUDA toolkit (Linux)
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_TOOLKIT_VERSION }}
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev", "thrust", "libcublas-dev", "libcusparse-dev", "libcusolver-dev", "libcurand-dev"]'

      - name: Download libtorch (Linux, CUDA)
        # PyTorch dropped the cxx11-abi-prefixed Linux libtorch starting
        # with the cu130 builds — the unprefixed file ships both ABIs
        # internally. Use plain `libtorch-shared-with-deps-...`.
        run: |
          URL="https://download.pytorch.org/libtorch/${LIBTORCH_CUDA}/libtorch-shared-with-deps-${LIBTORCH_VERSION}%2B${LIBTORCH_CUDA}.zip"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o libtorch.zip
          unzip -q libtorch.zip
          rm libtorch.zip
          echo "LIBTORCH=$GITHUB_WORKSPACE/libtorch" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/libtorch/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version "^0.11"

      - name: Build release binary (GPU)
        run: cargo build -p forex-app --release --no-default-features --features "${RELEASE_FEATURES}"

      - name: Create portable tar.gz with libtorch
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          OUTDIR="dist/ForexAI-${VERSION}-linux-x64-gpu"
          mkdir -p "$OUTDIR/lib"

          # Binary
          cp target/release/forex-app "$OUTDIR/ForexAI"
          chmod +x "$OUTDIR/ForexAI"

          # Bundle libtorch shared libraries
          cp -P "$LIBTORCH"/lib/*.so* "$OUTDIR/lib/" 2>/dev/null || true

          # Config + launcher
          cp config.yaml "$OUTDIR/config.yaml"
          cat > "$OUTDIR/run-forexai.sh" <<'SH'
          #!/usr/bin/env bash
          # Launcher that points the dynamic linker at the bundled libtorch
          DIR="$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )"
          export LD_LIBRARY_PATH="$DIR/lib:${LD_LIBRARY_PATH:-}"
          exec "$DIR/ForexAI" "$@"
          SH
          chmod +x "$OUTDIR/run-forexai.sh"

          # README
          cat > "$OUTDIR/README.txt" <<EOF
          ForexAI $VERSION (Linux, GPU)
          =============================

          Runtime requirements:
            - NVIDIA driver supporting CUDA 13.0 or newer (CUDA 13.2 recommended)
              -> verify with: nvidia-smi
            - The CUDA runtime libs bundled in lib/ cover libtorch; you do
              NOT need to install the CUDA toolkit separately.

          To run: ./run-forexai.sh   (the wrapper sets LD_LIBRARY_PATH)
          Or run directly with:
              LD_LIBRARY_PATH=\$(pwd)/lib ./ForexAI

          Bundled libtorch: ${LIBTORCH_VERSION}
          Bundled CUDA target: ${LIBTORCH_CUDA}
          EOF

          tar -czf "dist/ForexAI-${VERSION}-linux-x64-gpu.tar.gz" -C dist "ForexAI-${VERSION}-linux-x64-gpu"

      - name: Package .deb (optional, CPU layout)
        # The .deb does not bundle libtorch (would push it past the
        # ~50 MB Debian package threshold). It depends on the system
        # libtorch install — useful for ops that prefer apt/dpkg.
        run: cargo packager --release -p forex-app --formats deb || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-gpu
          path: |
            dist/*.tar.gz
            target/release/debian/*.deb
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release with all artifacts
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          name: "ForexAI ${{ github.ref_name || inputs.version }}"
          draft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## ForexAI ${{ github.ref_name || inputs.version }} — GPU release

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows installer | `ForexAI-*-setup.exe` | NSIS installer; libtorch + tree-model DLLs bundled |
            | Windows portable  | `ForexAI-*-windows-x64-gpu.zip` | Unzip and run `ForexAI.exe` |
            | Linux portable    | `ForexAI-*-linux-x64-gpu.tar.gz` | Untar and run `./run-forexai.sh` |
            | Linux .deb        | `*.deb` | System libtorch required (apt install) |

            ### Runtime requirements
            - **Windows / Linux**: NVIDIA driver supporting **CUDA 13.0+** (CUDA 13.2 recommended)
            - libtorch CUDA runtime DLLs/.so are bundled inside the archive — no separate PyTorch / Python install required
            - cTrader Open API credentials for live trading (Demo or Live)

            ### What's included
            - GPU-accelerated genetic strategy search (cubecl + tch-rs)
            - GPU-accelerated statistical / neuro-evolution backends
            - cTrader broker integration via Open API (OAuth, WebSocket)
            - TradingView-style chart with bid/ask + volume
            - Strategy discovery → walkforward → forward-test → prop-firm validation pipeline
            - AI ensemble (XGBoost, CatBoost, LightGBM, Burn deep models)
            - Append-only live trade journal (validation evidence chain)
            - LLM-based news blackout filter
            - Prop-firm risk guard rails

            > **Alpha release** — validated on demo accounts only. Do not use live without further testing.
          files: release-artifacts/**/*
