name: Release

# CPU release for Windows + Linux. The cubecl/tch GPU kernel modules
# in `forex-search` need a tch 0.22 / cubecl 0.9 API migration before
# they compile end-to-end (see docs/audits/gpu_migration_2026-05-11.md
# for the 126-error breakdown). Until that lands, the release ships
# the verified CPU discovery + execution paths.
#
# To re-enable the GPU build after the migration:
#   1. Change RELEASE_FEATURES below from "" to "gpu-experimental"
#   2. Restore the libtorch download + CUDA toolkit install steps
#      (kept in git history at commit 9fa53963)
#   3. Restore the libtorch DLL/.so bundling steps
#   4. Update README templates to declare the CUDA runtime requirement.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0-alpha)'
        required: false
        default: 'v0.1.0-alpha'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINDGEN_EXTRA_CLANG_ARGS: "-D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"

  # Cargo features enabled in the release. Empty = pure CPU build.
  # Set to "gpu-experimental" once the cubecl/tch migration lands.
  RELEASE_FEATURES: ""

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Windows CPU release — NSIS installer + portable zip
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64-msvc)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Rust toolchain (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-cargo-cpu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-cpu-

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version "^0.11"

      - name: Build release binary
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:RELEASE_FEATURES)) {
              cargo build -p forex-app --release
          } else {
              cargo build -p forex-app --release --features "$env:RELEASE_FEATURES"
          }

      - name: Stage native runtime DLLs
        # xgboost.dll lands in target/release/deps/ via its build script;
        # catboostmodel.dll lands in target/release/. Stage both next to
        # the binary so cargo-packager picks them up as resources.
        shell: pwsh
        run: |
          $release = "target\release"
          if (Test-Path "$release\deps\xgboost.dll") {
              Copy-Item "$release\deps\xgboost.dll" "$release\xgboost.dll" -Force
          }
          if (Test-Path "$release\catboostmodel.dll") {
              Copy-Item "$release\catboostmodel.dll" "crates\forex-app\catboostmodel.dll" -Force
          }
          if (Test-Path "$release\xgboost.dll") {
              Copy-Item "$release\xgboost.dll" "crates\forex-app\xgboost.dll" -Force
          }

      - name: Package NSIS installer
        run: cargo packager --release -p forex-app --formats nsis
        env:
          NSIS_PLUGINS: "${{ runner.tool_cache }}\\nsis"

      - name: Cleanup staged DLLs from crate root
        shell: pwsh
        run: |
          Remove-Item "crates\forex-app\catboostmodel.dll" -ErrorAction SilentlyContinue
          Remove-Item "crates\forex-app\xgboost.dll"       -ErrorAction SilentlyContinue

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name || inputs.version }}"
          $outDir = "dist\ForexAI-windows-x64"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Copy-Item "target\release\forex-app.exe"     "$outDir\ForexAI.exe"
          if (Test-Path "target\release\catboostmodel.dll") {
              Copy-Item "target\release\catboostmodel.dll" "$outDir\catboostmodel.dll"
          }
          if (Test-Path "target\release\xgboost.dll") {
              Copy-Item "target\release\xgboost.dll"       "$outDir\xgboost.dll"
          }
          Copy-Item "config.yaml"                      "$outDir\config.yaml"
          @"
          ForexAI $version (Windows, CPU)
          ================================

          This release ships the verified CPU paths. GPU acceleration
          will land in a future release once the cubecl/tch kernel
          migration completes (tracked at
          docs/audits/gpu_migration_2026-05-11.md).

          Runtime requirements:
            - Windows 10/11 x64
            - No NVIDIA / CUDA install needed for this build.

          To run: double-click ForexAI.exe, or launch from a terminal
          for log output.
          "@ | Set-Content "$outDir\README.txt"
          Compress-Archive -Path $outDir -DestinationPath "dist\ForexAI-$version-windows-x64.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            target/release/nsis/*.exe
            dist/*.zip
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Linux CPU release — .tar.gz portable bundle + .deb
  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64-gnu)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install system dependencies
        # cmake 3.28 is required by lightgbm-sys; Ubuntu 22.04 ships 3.22
        # so we pull a newer pip package after installing python3-pip.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config curl unzip \
            clang libclang-dev libstdc++-12-dev \
            libasound2-dev libudev-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxrandr-dev libxcursor-dev \
            libxi-dev libgl1-mesa-dev \
            python3-pip dpkg-dev
          pip3 install --user 'cmake>=3.28'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-cargo-cpu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-cpu-

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version "^0.11"

      - name: Build release binary
        run: |
          if [ -z "${RELEASE_FEATURES}" ]; then
              cargo build -p forex-app --release
          else
              cargo build -p forex-app --release --features "${RELEASE_FEATURES}"
          fi

      - name: Create portable tar.gz
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          OUTDIR="dist/ForexAI-${VERSION}-linux-x64"
          mkdir -p "$OUTDIR"

          cp target/release/forex-app "$OUTDIR/ForexAI"
          chmod +x "$OUTDIR/ForexAI"
          cp config.yaml "$OUTDIR/config.yaml"

          cat > "$OUTDIR/README.txt" <<EOF
          ForexAI $VERSION (Linux, CPU)
          =============================

          This release ships the verified CPU paths. GPU acceleration
          will land in a future release once the cubecl/tch kernel
          migration completes (tracked at
          docs/audits/gpu_migration_2026-05-11.md).

          Runtime requirements:
            - Linux x86_64 with glibc >= 2.35 (Ubuntu 22.04 or newer)
            - No NVIDIA / CUDA install needed for this build.

          To run: ./ForexAI
          For headless server mode: ./ForexAI --headless
          EOF

          tar -czf "dist/ForexAI-${VERSION}-linux-x64.tar.gz" -C dist "ForexAI-${VERSION}-linux-x64"

      - name: Package .deb
        run: cargo packager --release -p forex-app --formats deb || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/*.tar.gz
            target/release/debian/*.deb
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release with all artifacts
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          name: "ForexAI ${{ github.ref_name || inputs.version }}"
          draft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## ForexAI ${{ github.ref_name || inputs.version }} — CPU release

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows installer | `ForexAI-*-setup.exe` | NSIS installer; tree-model DLLs bundled |
            | Windows portable  | `ForexAI-*-windows-x64.zip` | Unzip and run `ForexAI.exe` |
            | Linux portable    | `ForexAI-*-linux-x64.tar.gz` | Untar and run `./ForexAI` |
            | Linux .deb        | `*.deb` | apt/dpkg install |

            ### What's included
            - Verified CPU discovery → walkforward → forward-test → prop-firm validation pipeline
            - Genetic strategy search engine
            - cTrader broker integration (OAuth, WebSocket, retry+backoff)
            - TradingView-style chart with bid/ask + volume
            - AI ensemble (XGBoost, CatBoost, LightGBM, Burn deep models)
            - Append-only live trade journal (validation evidence chain)
            - Prop-firm risk guard rails
            - Left sidebar navigation + top-bar Start/Stop controls

            ### Coming next
            - GPU acceleration via cubecl + libtorch (tracked at
              `docs/audits/gpu_migration_2026-05-11.md`)

            > **Alpha release** — validated on demo accounts only. Do not use live without further testing.
          files: release-artifacts/**/*
