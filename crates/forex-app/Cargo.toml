[package]
name = "forex-app"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.31.0" # UI framework (egui)
egui = "0.31.0"
egui_dock = "0.16.0"
tokio = { version = "1.43.0", features = ["full", "rt-multi-thread"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
anyhow = "1.0.100"
keyring = "3.6.3"
open = "5.3.2"
reqwest = { version = "0.12.24", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tungstenite = { version = "0.28.0", features = ["rustls-tls-native-roots"] }
polars = { version = "0.52.0", features = ["lazy", "parquet", "dtype-full", "temporal", "timezones"] }

# Our internal core engines
forex-core = { path = "../forex-core" }
forex-data = { path = "../forex-data" }
forex-search = { path = "../forex-search" }
forex-models = { path = "../forex-models" }
mt5-bridge = { path = "../mt5-bridge" }
ndarray = "0.17.2"
clap = { version = "4.6.0", features = ["derive"] }
num_cpus = "1.17.0"

[package.metadata.packager]
product_name = "ForexAI"
identifier = "com.forexai.app"
authors = ["Forex AI Developers"]
description = "Advanced Algorithmic Forex Terminal with ML and Live Execution"
formats = ["nsis", "wix"]
resources = ["config.yaml"]

[[package.metadata.packager.binaries]]
path = "forex-app"
main = true

[package.metadata.packager.windows]
wix = { language = "en-US" }
