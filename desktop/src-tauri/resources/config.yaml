system:
  symbol: EURUSD
  # F-304 (2026-05-28): account currency for the backtest cost model.
  # Cost model uses this for commission/swap/pnl_conversion_fee FX
  # conversions and the risk gate uses it for position-sizing pip-value
  # math. Auto-populated from cTrader trader profile when the broker
  # session is alive — manual setting here is the operator override.
  # Leave empty to force fail-loud guard if no broker session is wired.
  account_currency: USD
  data_dir: data
  base_timeframe: M1  # 1-minute base for multi-timeframe analysis
  multi_resolution_enabled: false  # agent 2026-06-05: top-down MTF (base + strictly-HIGHER TFs only). When true, resolve_higher_timeframes returned ALL canonical TFs except the base (incl M1's 5.27M rows) as "higher" → every combo serially reloaded M1 (the pre-GA wall that stopped combos completing on laptop AND VPS) AND fed M1 noise into coarse-TF strategies. false = base+higher only → the cmd_discover base+higher load-fix actually helps + cleaner features.
  multi_resolution_timeframes: [M1, M3, M5, M15, M30, H1, H2, H4, D1, W1, MN1]
  multi_resolution_prefix_base: false
  use_volume_features: true
  higher_timeframes: [M3, M5, M15, M30, H1, H2, H4, D1, W1, MN1]
  poll_interval_seconds: 60
  metrics_db_path: metrics.sqlite
  cache_dir: cache
  # Hardware is detected automatically (CPU/GPU/RAM)
  # Set preference to "auto", "true" (force GPU), or "false" (force CPU)        
  enable_gpu_preference: auto  # agent 2026-06-05: auto-detect (was "cpu", a laptop iGPU-OOM workaround). The search GA hybrid is compile-gated regardless of this knob; on a real GPU (L40 VPS) the gpu-vulkan build uses it, and a CPU-only build ignores it. Per-machine override stays possible.
  # agent 2026-06-05 overfitting fix: removed dead `discovery_auto_cap` /
  # `discovery_max_rows` / `discovery_stream` keys — never consumed by code.
  # The REAL discovery row cap is `models.prop_search_max_rows` (see below).

risk:
  initial_balance: 10000  # Fallback used when broker balance is unavailable
  min_risk_per_trade: 0.0
  max_risk_per_trade: 0.030
  risk_per_trade: 0.030
  daily_drawdown_limit: 0.04
  total_drawdown_limit: 0.07
  min_risk_reward: 2.0
  challenge_mode: true
  challenge_phase: phase_1
  prop_firm_rules: true
  kill_zones_enabled: true
  max_trades_per_day: 8
  high_quality_confidence: 0.65
  atr_period: 14
  atr_stop_multiplier: 1.5
  triple_barrier_max_bars: 35
  trailing_enabled: true
  trailing_atr_multiplier: 1.0
  trailing_be_trigger_r: 1.0
  slippage_pips: 0.5
  commission_per_lot: 7.0
  backtest_spread_pips: 1.5
  conformal_enabled: true
  conformal_alpha: 0.10
  conformal_abstain_min_set_size: 3
  meta_label_tp_pips: null
  meta_label_sl_pips: null
  meta_label_max_hold_bars: 100
  meta_label_min_dist: 0.0005
  meta_label_fixed_sl: 0.0020
  meta_label_fixed_tp: 0.0040
  vol_horizon_bars: 5

models:
  ml_models: [lightgbm, xgboost, xgboost_rf, xgboost_dart, catboost, catboost_alt, sklears_tree, mlp, neat, elasticnet, bayes_logit, online_pa, online_hoeffding, swarm_forecaster, isolation_forest]
  use_rl_agent: true
  use_sac_agent: true
  use_rllib_agent: false
  rllib_num_workers: 0
  auto_enable_rllib: true
  use_neuroevolution: true
  rl_population_size: 5
  rl_timesteps: 100000
  rl_eval_episodes: 15
  rl_network_arch: [256, 256]
  rl_parallel_envs: 1
  rl_state_bins: 255
  rl_state_encoding: normalized
  rl_update_interval: 0
  rl_update_freq: 0
  rl_learning_rate: 0.001
  rl_gamma: 0.99
  rl_epsilon_start: 1.0
  rl_epsilon_end: 0.02
  rl_epsilon_decay: 0.995
  rl_buffer_capacity: 0
  rl_reward_horizon: 0
  rl_episode_len: 0
  rl_train_seconds: 3600
  exit_agent_hidden_dim: 128
  exit_agent_gamma: 0.99
  exit_agent_epsilon: 0.20
  exit_agent_epsilon_min: 0.05
  exit_agent_epsilon_decay: 0.999
  exit_agent_memory_capacity: 10000
  exit_agent_reward_horizon: 0
  exit_agent_warmup_steps: 0
  evo_train_seconds: 3600
  evo_hidden_size: 64
  evo_population: 32
  evo_islands: 8  # MORE ISLANDS = MORE DIVERSITY (was 4, now 8)
  evo_sigma: 0.25
  prop_search_enabled: true  # CRITICAL: Enable strategy discovery!
  discovery_mode: prop_firm  # FTMO-style robust discovery (default)
  # Feature prefilter (in-sample correlation ranking). The prefilter ranks the
  # multi-resolution feature cube by |corr| with the BASE TF's 1-bar forward
  # return and keeps the top-K. A slow higher-TF indicator is near-constant
  # across many base bars, so its 1-bar-forward corr is ~0 by construction —
  # the top-K alone therefore discards EVERY multi-TF (H1_/H4_/M15_/...) feature
  # and the GA's multi-TF seed templates find no prefixes (→ "0 genes" → random
  # cold start), wasting the whole multi-resolution cube. prefilter_min_per_timeframe
  # force-keeps each present higher-TF group's best-N features ADDITIVELY (like
  # the regime_* force-keep) so multi-TF context actually reaches the GA.
  # 0 = legacy base-only behaviour. (root-caused + fixed 2026-06-08)
  discovery_runtime:
    prefilter_top_k: 50
    prefilter_insample_frac: 0.80   # automatic 80/20 in-sample/out-of-sample validation split
    prefilter_min_per_timeframe: 6
  prop_search_population: 200  # 2026-06-06 operator: 100->200 per-island (200 × 8 islands = 1600 total) — MORE breadth/diversity per generation → finds more of the rare low-DD regime-specialist genes (the deep experiment found maxDD 2.7-4.5% vs 7-9.5% shallow).
  prop_search_generations: 20000  # 2026-06-06 operator: 1000->20000 — deep GA. Time-bounded by max_hours (binds first on big TFs); on small/fast TFs lets the GA search far deeper than the old 1000 cap.
  prop_search_max_hours: 1.0  # 2026-06-06 operator: 0.5->1.0 — a full hour of deep search per combo (the experiment used 1h and found notably better genes). NOTE: a full 126-combo library run at 1h/combo exceeds current VPS credit — for the full library, add credit or lower this. Re-read per combo.
  prop_search_max_rows: 0  # operator 2026-06-05: NO cap — use ALL data per file (400k cut M1 to ~9mo -> "not enough history" + capped depth). 0=full history. Per-TF override via prop_search_max_rows_by_tf (not hardcoded).
  prop_search_portfolio_size: 50  # 2026-06-06 operator regime-diversity mandate: keep MANY diverse regime-specialist strategies per pair (was 4). The goal is a LARGE library, each capturing a different market condition; the live ensemble + regime-detection deploys each when its edge is active. Correlation-diversification still picks the most-diverse top-N.
  # agent 2026-06-05 overfitting fix: 0 meant unlimited (usize::MAX) -> genes used
  # up to 58 indicators = severe overfitting; 16 caps degrees of freedom (regularization).
  prop_search_max_indicators: 16
  prop_search_async: true
  prop_search_async_wait: false
  tree_device_preference: gpu
  prop_search_parent_selection: rank
  prop_search_survivor_selection: rank
  prop_search_survivor_fraction: 0.10
  prop_search_immigrant_fraction: 0.18
  prop_search_selection_temperature: 0.75
  prop_search_tournament_size: 10
  prop_search_checkpoint: models/strategy_evo_checkpoint.json
  prop_search_device: cpu
  prop_search_train_years: 8
  prop_search_val_years: 1
  prop_search_val_candidates: 0
  prop_search_val_min_positive_months: 0
  prop_search_val_min_trades_per_month: 15
  prop_search_val_min_trades_per_day: 1.0  # operator 2026-06-05: >=1 trade per working day so we can actually observe what a strategy does
  prop_search_val_min_monthly_profit_pct: 0.0
  prop_search_val_log_trades: true
  prop_search_val_trade_log_max: 50
  prop_search_opportunistic_enabled: true
  prop_search_opportunistic_min_positive_months: 3
  prop_search_opportunistic_min_trades_per_month: 10
  prop_search_opportunistic_min_trade_return_pct: 4.0
  prop_search_opportunistic_max_dd: 0.025
  # 2026-05-26 operator directive (dual-mode product): the 5 knobs below were
  # previously hardcoded in `crates/neoethos-search/src/discovery.rs`. Surfaced
  # here so dual-mode operators can tune dedup aggressiveness + MC test rigour
  # + sensitivity-test stress level from a single YAML.
  prop_search_corr_threshold: 0.85          # |corr| ≥ this rejects strategy from portfolio (Pearson + Spearman both checked)
  prop_search_mc_runs: 100                  # Monte-Carlo perturbation runs per candidate
  prop_search_mc_min_profitable: 70         # min profitable MC runs to survive (out of mc_runs)
  prop_search_sensitivity_spread_pips: 2.0  # stress-test spread (pips) — keep > production spread
  prop_search_sensitivity_commission_per_lot: 7.0  # stress-test commission per lot (USD)
  train_batch_size: 32
  inference_batch_size: 32
  enable_transformer_expert: true
  transformer_heads: 8
  transformer_layers: 4
  transformer_hidden_dim: 256
  transformer_dropout: 0.10
  transformer_seq_len: 64
  transformer_train_seconds: 3600
  nbeats_train_seconds: 3600
  tide_train_seconds: 3600
  tabnet_train_seconds: 3600
  kan_train_seconds: 3600
  kan_grid_size: 9
  mlp_train_seconds: 3600
  num_transformers: 2
  swarm_memory_limit_mb: 256.0
  swarm_horizon: 0
  swarm_frequency: H
  swarm_strategy: bayesian
  swarm_online_learning: true
  swarm_interpretability_needed: true
  swarm_latency_ms: 0
  hpo_backend: ax
  hpo_trials: 8
  hpo_trials_by_model:
    lightgbm: 8
    xgboost: 8
    xgboost_rf: 6
    xgboost_dart: 6
    catboost: 8
    catboost_alt: 6
    mlp: 6
    tabnet: 6
    nbeats: 6
    tide: 6
    kan: 6
    transformer: 6
  hpo_max_rows: 1000000
  max_epochs_by_model:
    tabnet: 200
    tide: 200
  ray_tune_max_concurrency: 8
  export_onnx: true  # Export ONNX for fast CPU inference (one-time at startup if missing)
  phase5_filter_meta_blender: true
  phase5_core_models: [transformer, nbeats, tide, tabnet, kan]
  calibration_enabled: true
  calibration_method: platt
  calibration_min_rows: 300
  model_param_overrides: {}
  regime_router_enabled: true
  regime_router_min_models: 2
  regime_trend_models: [transformer, patchtst, timesnet, nbeats, nbeatsx_nf, tide, tide_nf]
  regime_range_models: [tabnet, lightgbm, xgboost, xgboost_rf, xgboost_dart, catboost, catboost_alt, elasticnet, bayes_logit, online_pa, online_hoeffding]
  regime_neutral_models: []
  l1_feature_selection_enabled: true
  l1_feature_selection_per_regime: true
  l1_feature_selection_min_features: 20
  l1_feature_selection_max_features: 256
  l1_feature_selection_sample_limit: 200000
  l1_feature_selection_c: 0.20
  # Train using base-signal filter for meta-labeling (set false to use all rows)
  filter_to_base_signal: true
  train_holdout_pct: 0.2
  # Global pooling caps (0 = no cap)
  global_max_rows: 0
  global_max_rows_per_symbol: 0
  label_use_triple_barrier: true
  # 0 = fall back to risk.meta_label_max_hold_bars
  label_horizon_bars: 0
  label_neutral_band_atr_fraction: 0.25
  # 0 = derive from risk.atr_stop_multiplier / risk.min_risk_reward
  label_stop_atr_multiplier: 0.0
  label_take_profit_rr: 0.0
  prop_metric_weight: 1.0
  prop_accuracy_weight: 0.1
  prop_min_trades: 0
  prop_conf_threshold: 0.55
  walkforward_splits: 15  # 2026-06-24 operator "improve success odds": 10→15 more out-of-sample folds = tighter OOS confidence (more unseen windows tested). Still informational (not a hard gate) — see require_walkforward_for_export below.
  embargo_minutes: 120
  # agent 2026-06-05 overfitting fix: walk-forward as an EXPORT GATE. When true
  # (default), a discovered portfolio is export-ready in PropFirm mode ONLY if it
  # also passes walk-forward (out-of-sample) — not just the prop-firm window gate.
  # This stops in-sample-overfit strategies (IS Sharpe 3-11 / PF up to 62) that
  # fail walk-forward from exporting. Set false to restore window-gate-only.
  require_walkforward_for_export: false  # 2026-06-06 operator regime-diversity mandate: walk-forward tests ALL-PERIOD generalization → as a HARD gate it kills regime-specialists (genes good in SOME market conditions, not all years), which is exactly what we WANT to keep. Now INFORMATIONAL: walk-forward still RUNS and is recorded per strategy (so the live system knows each strategy's OOS character), but it no longer blocks export. Robustness comes from portfolio DIVERSITY + live regime-detection, not per-strategy all-period generalization. Set true to restore the hard OOS export gate.
  # agent 2026-06-05 overfitting fix: hard floor for the prop-firm window
  # pass-rate (combined as max with discovery_runtime.prop_firm_gate.pass_rate,
  # which defaults to 0.0 = ranking-only). 0.65 = a candidate must pass FTMO
  # rules on ≥65% of random evaluation windows to survive. Raise toward 1.0 for
  # stricter selection; lower (e.g. 0.0) to restore the old ranking-only behaviour.
  prop_firm_min_pass_rate: 0.0  # 2026-06-06 operator regime-diversity mandate: 0.65→0.40→0.0. A hard all-window consistency floor KILLS regime-specialists (genes active in only SOME market conditions) — exactly the strategies we WANT for a diverse library. 0.0 = RANKING-ONLY: the prop-firm window-pass-rate still RANKS candidates (more-consistent first) but no longer kills any. The LOW-DD base filter (max_dd) + quality screen (MC/spread/regime) + min-trades still reject blow-ups and noise. Raise (e.g. 0.40-0.65) to demand all-window consistency again.
  # CPCV (Combinatorial Purged Cross-Validation) settings
  enable_cpcv: true
  cpcv_n_splits: 8   # 2026-06-24: 5→8 more combinatorial purged folds = stronger overfit detection (more train/test combinations)
  cpcv_n_test_groups: 2
  cpcv_embargo_pct: 0.01
  cpcv_purge_pct: 0.02
  cpcv_min_phi: 0.80
  cpcv_max_rows: 200000  # agent 2026-06-05: was 0 (=full rows) → CPCV (combinatorial purged CV, the single heaviest serial validation) ran on 1.05M rows. 200k bounds it on every TF; CPCV stays enabled (López de Prado overfitting check, kept per "stats are the authority") but capped. Informational in PropFirm mode.

news:
  news_decay_minutes: 120
  news_kill_window_min: 30
  news_confidence_threshold: 0.65
  news_calendar_enabled: true
  news_calendar_source: forexfactory
  news_lookahead_minutes: 60
  news_trade_on_event: true
  news_trade_confidence_threshold: 0.90
  news_event_risk_pct: 0.001  # minimal risk per event (0.1%)
  enable_news: true
  news_sources: [rss] 
  rss_feeds:
    - https://www.investing.com/rss/news.rss
    - https://www.fxstreet.com/rss/news
    - https://www.cnbc.com/id/100003114/device/rss/rss.html
  news_local_glob: ""
  news_backfill_enabled: true
  news_backfill_days: 0  # 0 = full data span
  enable_llm_helper: true
  llm_helper_enabled: true
