# Flutter gen-l10n configuration (2026-06-03).
# `flutter pub get` / `flutter gen-l10n` reads this and emits
# lib/l10n/app_localizations.dart (+ per-locale app_localizations_*.dart)
# from the .arb files in lib/l10n. Imported relatively as
# `import 'l10n/app_localizations.dart';` (non-synthetic output — the
# `package:flutter_gen` synthetic package is retired in recent Flutter).
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
# Emit the untranslated-message report so the string sweep can track
# which keys still need a Greek translation.
untranslated-messages-file: l10n_untranslated.txt
