name: forex_flutter_ui
description: >
  Flutter desktop/mobile front-end for neoethos.
  Talks to the Rust backend (neoethos-app + neoethos-codex) over REST.
  Mirrors the layout / design tokens of mockups/ui_mockup.html.
publish_to: 'none'
version: 0.4.35+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management — Riverpod chosen over BLoC because the screen
  # graph is small (14 panels) and Riverpod's compile-time-safe
  # providers fit the "thin client over a Rust backend" model.
  # NOTE 2026-05-26: kept on ^2.5.1. Tried bumping to ^3.0.0 and discovered
  # 35 hard breaks in `flutter analyze`:
  #   - `StateProvider` and `AutoDisposeFutureProvider(Family)` were
  #     removed (not just deprecated) — every legacy provider must
  #     migrate to `Notifier` / `NotifierProvider` with new constructors.
  #   - `AsyncValue<T>.valueOrNull` was removed (~12 call sites).
  #   - `Override` was renamed.
  # This is a structural migration across 30+ files, not a version pin
  # bump. Tracked for a dedicated session.
  flutter_riverpod: ^2.5.1

  # REST
  dio: ^5.5.0          # HTTP client
  http: ^1.2.1         # fallback simple HTTP

  # Browser launcher for Codex OAuth (PKCE authorize URL).
  url_launcher: ^6.3.0

  # Routing — go_router for declarative side-bar driven nav.
  go_router: ^14.2.0

  # Charts — fl_chart for the Dashboard equity sparkline and the
  # fl_chart — kept for simple line/spark panels elsewhere.
  fl_chart: ^0.68.0

  # k_chart_plus — professional candlestick/k-line chart: pan/zoom,
  # MA/BOLL main overlays + MACD/KDJ/RSI/WR sub-panels, onLoadMore for
  # scroll-back history. Replaces the custom CustomPaint chart so the
  # NeoEthos chart reaches TradingView/cTrader parity (operator request).
  k_chart_plus: ^1.0.4

  # Date / time formatting + duration helpers.
  # Pinned to ^0.19.0 to satisfy k_chart_plus (which caps intl at
  # ^0.19.0). 0.19↔0.20 are CHANGELOG-compatible for the `DateFormat`
  # (yyyy-MM-dd HH:mm, HH:mm:ss, MMM d) and `NumberFormat`
  # (#,##0, +#,##0.0;-#,##0.0) patterns all 12 `lib/` call sites use, so
  # this downgrade is behaviour-neutral.
  intl: ^0.19.0

  # Logging - flows into the backend log stream eventually.
  logger: ^2.4.0

  # Server-Sent Events client (#237, 2026-05-25). The Rust backend
  # exposes `/account/snapshot/stream` + `/live/spots/stream` so the
  # Flutter UI gets push updates (5-750 ms latency) instead of
  # polling every 1-5 s. `eventflux` is the canonical Flutter SSE
  # client in 2026: built on `http`, supports exponential backoff
  # with per-retry header refresh (for auth token rotation), and has
  # explicit Windows/macOS/Linux desktop support. We deliberately
  # skipped `flutter_client_sse` (eventflux's stale grandparent, no
  # built-in reconnect) and `dio` + custom transformer (dio buffers
  # the full response in some configurations - bursty data, defeats
  # the latency win we're chasing here).
  eventflux: ^2.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0  # 2026-05-26 bumped from ^4.0.0 — pulls latest lint rule set; new warnings get triaged on next `flutter analyze` pass
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  # Asset folders for future use (icons, custom fonts).
