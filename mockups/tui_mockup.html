<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8" />
<title>NeoEthos — TUI mockup (ratatui-style)</title>
<style>
/* ──────────────────────────────────────────────────────────────────────
   TUI mockup — emulates a terminal running the Rust ratatui frontend.
   Designed for SSH / headless server access. Keyboard-driven.
   ────────────────────────────────────────────────────────────────────── */
:root {
  --term-bg:        #0b0e14;   /* terminal black */
  --term-fg:        #c5c8c6;   /* default text */
  --term-bright:    #ffffff;
  --term-dim:       #5c6370;
  --term-faint:     #3b4047;
  --ansi-red:       #ef5350;
  --ansi-green:     #26a69a;
  --ansi-yellow:    #f4b400;
  --ansi-blue:      #2962ff;
  --ansi-cyan:      #00bcd4;
  --ansi-magenta:   #9c27b0;
  --ansi-white:     #e6eaf2;
  --ansi-bg-active: #1c2230;
  --border-active:  #2962ff;
  --border-idle:    #3a404d;
}
* { box-sizing: border-box; }
html, body {
  margin:0; padding:0; width:100%; height:100%;
  background: #000;
  color: var(--term-fg);
  font-family: "Cascadia Mono","Cascadia Code","SF Mono","Consolas","Courier New",monospace;
  font-size: 13px;
  line-height: 1.35;
  overflow: hidden;
  letter-spacing: 0;
}

.term-window {
  background: var(--term-bg);
  height: 100vh; width: 100vw;
  display:flex; flex-direction:column;
  padding: 4px 6px;
}

/* fake titlebar so it looks like a terminal app window */
.term-titlebar {
  background:#1f2228; color:#9c9c9c;
  padding:3px 10px; font-size:11px;
  display:flex; gap:8px; align-items:center;
  border-radius:4px 4px 0 0;
  border-bottom:1px solid #000;
  font-family: -apple-system,BlinkMacSystemFont,sans-serif;
}
.term-titlebar .dot { width:10px; height:10px; border-radius:50%; }
.term-titlebar .dot.r { background:#ff5f56; }
.term-titlebar .dot.y { background:#ffbd2e; }
.term-titlebar .dot.g { background:#27c93f; }
.term-titlebar .prompt { color:#9c9c9c; margin-left:8px; font-family:monospace; font-size:11px;}
.term-titlebar .right { margin-left:auto; color:#666; font-size:11px;}

/* full TUI area */
.tui {
  flex:1;
  white-space: pre;
  font-variant-ligatures: none;
  overflow: hidden;
  padding: 4px 0;
}

/* color classes used as inline spans */
.r{color:var(--ansi-red);} .g{color:var(--ansi-green);} .y{color:var(--ansi-yellow);}
.b{color:var(--ansi-blue);} .c{color:var(--ansi-cyan);} .m{color:var(--ansi-magenta);}
.w{color:var(--ansi-white);} .dim{color:var(--term-dim);} .faint{color:var(--term-faint);}
.bold{font-weight:bold;}
.inv{background:var(--ansi-blue); color:#fff;}
.invG{background:var(--ansi-green); color:#000;}
.invR{background:var(--ansi-red); color:#fff;}
.invY{background:var(--ansi-yellow); color:#000;}
.bg-sel{background:#1c2230;}
.bg-blue-dim{background:#0d2746;}

/* tab row */
.tab { padding:0 4px; cursor:pointer; }
.tab.active { background:var(--ansi-blue); color:#fff; font-weight:bold; }
.tab:hover { background:#1c2230; }

/* status hint bar */
.tui-hint {
  background:#1c2230; color:#9aa4b2; font-size:11px;
  padding:2px 8px; border-top:1px solid #2a2f3a;
  font-family:"Cascadia Mono",monospace;
}
.tui-hint .kbd {
  background:#3a404d; color:#fff; padding:0 5px; border-radius:2px;
  margin:0 2px; font-size:10px;
}

.scrolly { overflow:auto; max-height:calc(100vh - 32px); }
</style>
</head>

/* ── Helpers for ASCII box drawing ── */
const w = 142;   // total width — fits 80x30 but goes wider for modern terminals
function hr(n=w, ch='─') { return ch.repeat(n); }
function row(content, width=w) {
  // content can contain HTML spans; we pad based on stripped text length
  const txt = content.replace(/<[^>]+>/g,'');
  const pad = Math.max(0, width - txt.length);
  return content + ' '.repeat(pad);
}
function pad(text, len, side='left') {
  const txt = String(text).replace(/<[^>]+>/g,'');
  const need = Math.max(0, len - txt.length);
  return side === 'right' ? ' '.repeat(need) + text : text + ' '.repeat(need);
}
function center(text, len) {
  const txt = String(text).replace(/<[^>]+>/g,'');
  const need = Math.max(0, len - txt.length);
  const l = Math.floor(need/2);
  return ' '.repeat(l) + text + ' '.repeat(need - l);
}

/* ── Top banner + tab bar ── */

    '<span class="c">║</span> ' + row('<span class="bold w">NeoEthos v0.2.0-tui</span>  <span class="dim">' + symbolLine + '</span>', w-3) + '<span class="c">║</span>',
    '<span class="c">╟' + hr(w-2,'─') + '╢</span>',
    '<span class="c">║</span> ' + row(tabs, w-3) + '<span class="c">║</span>',
    '<span class="c">╚' + hr(w-2,'═') + '╝</span>',
    '',
  ].join('\n');
}

/* ── Panel renderer with title + content lines ── */
function panel(title, content, width, active=false) {
  const tl = active ? '╔' : '┌';
  const tr = active ? '╗' : '┐';
  const bl = active ? '╚' : '└';
  const br = active ? '╝' : '┘';
  const h  = active ? '═' : '─';
  const v  = active ? '║' : '│';
  const cl = active ? 'b' : 'dim';
  const titleColored = active ? `<span class="b bold">[ ${title} ]</span>` : `<span class="dim">[ ${title} ]</span>`;
  const top = `<span class="${cl}">${tl}${h.repeat(2)}</span>${titleColored}<span class="${cl}">${h.repeat(width - titleColored.replace(/<[^>]+>/g,'').length - 3)}${tr}</span>`;
  const body = content.split('\n').map(line => `<span class="${cl}">${v}</span> ${pad(line, width-3)}<span class="${cl}">${v}</span>`).join('\n');
  const bottom = `<span class="${cl}">${bl}${h.repeat(width-2)}${br}</span>`;
  return top + '\n' + body + '\n' + bottom;
}

function render() {
  document.getElementById('tuiContent').innerHTML = renderHeader() + renderTab() + renderFooter();
  // Wire tab clicks
  document.querySelectorAll('[data-tab]').forEach(el => el.onclick = () => {
    activeTab = el.dataset.tab; render();
  });
}

/* Keyboard navigation */
const keymap = { F1:'dash', F2:'chart', F3:'mkts', F4:'order', F5:'news', F6:'watch',
                 F7:'disc', F8:'train', F9:'intel', F10:'brkr', F11:'risk', F12:'set' };
document.addEventListener('keydown', e => {
  if (keymap[e.key]) { e.preventDefault(); activeTab = keymap[e.key]; render(); return; }
  if (e.key.toLowerCase() === 'a') { autoTrade = !autoTrade; render(); }
  if (e.key.toLowerCase() === 'q') { /* would quit */ alert('Press Ctrl+C in a real terminal to quit'); }
});

/* Live clock update */
setInterval(render, 1000);
render();
