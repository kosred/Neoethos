VIEWS.DataBootstrap.afterRender = function() {
  const f = S.bootstrapForm;

  // ── File drop zone / picker ──
  const dz = document.getElementById('dropZone');
  const fi = document.getElementById('fileInput');
  const detect = (name) => {
    const m = name.toUpperCase().match(/([A-Z]{6}|[A-Z]{3}USD|XAU|XAG|BTC|US30|NAS100|SPX500|DAX)/);
    const tfm = name.toUpperCase().match(/_?(S5|S15|S30|M1|M2|M3|M5|M10|M15|M30|M45|H1|H2|H4|H6|H8|H12|D1|W1|MN)\b/);
    const ext = name.split('.').pop().toLowerCase();
    let icon = '📄';
    if (ext === 'csv') icon = '📊'; else if (ext === 'zip') icon = '🗜'; else if (ext === 'parquet') icon = '🪶';
    else if (ext === 'hst') icon = '📈'; else if (ext === 'bi5') icon = '🦆';
    return { symbol: m?m[1]:'?', tf: tfm?tfm[1]:'?', icon, ext, detected: m?`Detected ${m[1]} ${tfm?tfm[1]:''}`:'Format will be parsed on import' };
  };
  const addFiles = (files) => {
    for (const file of files) {
      const det = detect(file.name);
      S.importedFiles.push({ name: file.name, size: file.size, symbol: det.symbol, tf: det.tf, icon: det.icon, detected: det.detected });
    }
    toast(`Added ${files.length} file${files.length>1?'s':''}`, S.importedFiles.length + ' total queued', 'success'); renderView();
  };
  if (dz) {
    dz.onclick = () => fi.click();
    fi.onchange = (e) => { if (e.target.files.length) addFiles(e.target.files); fi.value=''; };
    ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); dz.classList.add('dragover'); }));
    ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); dz.classList.remove('dragover'); }));
    dz.addEventListener('drop', e => { if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
  }
  document.querySelectorAll('[data-rm-file]').forEach(x => x.onclick = (e) => {
    e.stopPropagation();
    S.importedFiles.splice(parseInt(x.dataset.rmFile), 1);
    toast('File removed','','warn'); renderView();
  });
  const importBtn = document.getElementById('importFilesBtn');
  if (importBtn) importBtn.onclick = () => {
    const n = S.importedFiles.length;
    if (!n) return;
    const totalMb = (S.importedFiles.reduce((s,f)=>s+f.size,0)/1024/1024).toFixed(2);
    modal('Import local files', `
      <div class="kv-row"><span class="lbl">Files</span><span class="bold">${n}</span></div>
      <div class="kv-row"><span class="lbl">Total size</span><span class="bold">${totalMb} MB</span></div>
      <div class="kv-row"><span class="lbl">Destination</span><span class="mono">./data/</span></div>
      <div class="help-tip">Files will be parsed, normalised to UTC, deduplicated against existing cache, and indexed. Original files stay in place.</div>
    `, [
      { label:'Cancel', kind:'ghost' },
      { label:`Import ${n} file${n>1?'s':''}`, kind:'primary', action: () => {
        toast('Importing files...', `${totalMb} MB · parsing`, '');
        setTimeout(() => {
          pushNotification('Local files imported', `${n} files · ${totalMb} MB normalised to cache`, 'success');
          toast('Import complete', `${n} files added to ./data/`, 'success');
          S.importedFiles = [];
          renderView();
        }, 900);
      }},
    ]);
  };
  const clearBtn = document.getElementById('clearFilesBtn');
  if (clearBtn) clearBtn.onclick = () => { S.importedFiles = []; renderView(); };

  // ── Fetch-from-broker chip wiring ──
  const syncF = () => { f.pairs = f.symbolList.join(', '); f.timeframes = f.tfList.join(', '); };

  // Symbol chips
  document.querySelectorAll('[data-chip-group="bspair"] .x[data-rm]').forEach(x => x.onclick = e => {
    e.stopPropagation(); f.symbolList = f.symbolList.filter(s => s !== x.dataset.rm); syncF(); renderView();
  });
  const bsAddPair = document.querySelector('[data-add-chip="bspair"]');
  if (bsAddPair) bsAddPair.onclick = (e) => {
    e.stopPropagation();
    modal('Add pairs to bootstrap', `
      <div class="muted" style="font-size:11px;margin-bottom:8px;">Pick the symbols you want historical bars for. We will fetch all selected timeframes × pairs.</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:340px;overflow:auto;">
        ${[...new Set([...Object.values(S.watchlists).flat()])].map(s => `<label style="padding:6px 8px;background:var(--surface-bg);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;">
          <input type="checkbox" data-bs-addsym="${s}" ${f.symbolList.includes(s)?'checked':''}> ${s}
        </label>`).join('')}
      </div>
    `, [
      { label:'Cancel', kind:'ghost' },
      { label:'Apply', kind:'primary', action: () => {
        f.symbolList = [...document.querySelectorAll('[data-bs-addsym]:checked')].map(c=>c.dataset.bsAddsym);
        syncF(); toast(`${f.symbolList.length} pairs selected`, '', 'success'); renderView();
      }},
    ]);
  };
  document.querySelectorAll('[data-bs-sym-preset]').forEach(b => b.onclick = () => {
    const p = SYMBOL_PRESETS.find(x => x.k === b.dataset.bsSymPreset);
    f.symbolList = p.pick(); syncF();
    toast(`Pairs → ${p.n}`, `${f.symbolList.length} symbols`, 'success'); renderView();
  });
  const bsAutoSym = document.getElementById('bsAutoDetectSym');
  if (bsAutoSym) bsAutoSym.onclick = () => {
    // Try imported files first, fall back to scan broker
    const fromFiles = [...new Set((S.importedFiles||[]).map(x => x.symbol).filter(s => s && s !== '?'))];
    if (fromFiles.length) {
      f.symbolList = [...new Set([...f.symbolList, ...fromFiles])]; syncF();
      toast(`Auto-detected ${fromFiles.length} symbol${fromFiles.length>1?'s':''}`, fromFiles.join(', '), 'success'); renderView();
    } else {
      toast('Scanning broker symbol list...', 'cTrader Open API · symbolsForCTraderAccount', '');
      setTimeout(() => {
        // Add a few common ones if list is empty
        const detected = ['EURUSD','GBPUSD','USDJPY','XAUUSD','BTCUSD'];
        f.symbolList = [...new Set([...f.symbolList, ...detected])]; syncF();
        toast('Symbol list pulled','5 popular symbols added','success'); renderView();
      }, 700);
    }
  };

  // Timeframe chips
  document.querySelectorAll('[data-chip-group="bstf"] .x[data-rm]').forEach(x => x.onclick = e => {
    e.stopPropagation(); f.tfList = f.tfList.filter(t => t !== x.dataset.rm); syncF(); renderView();
  });
  const bsAddTf = document.querySelector('[data-add-chip="bstf"]');
  if (bsAddTf) bsAddTf.onclick = (e) => {
    e.stopPropagation();
    const rect = e.target.getBoundingClientRect();
    const items = [];
    ALL_TIMEFRAMES.forEach(g => {
      items.push({ label: g.group, icon:'·' });
      g.items.forEach(([k,l]) => items.push({
        label: `${l}${f.tfList.includes(k)?' ✓':''}`, sub:k, icon: f.tfList.includes(k)?'●':'',
        onClick: () => {
          if (f.tfList.includes(k)) f.tfList = f.tfList.filter(t => t !== k);
          else f.tfList.push(k);
          syncF(); renderView();
        }
      }));
      items.push({ divider:true });
    });
    openCtxMenu(rect.left, rect.bottom + 4, items);
  };
  document.querySelectorAll('[data-bs-tf-quick]').forEach(b => b.onclick = () => {
    const t = b.dataset.bsTfQuick;
    if (f.tfList.includes(t)) f.tfList = f.tfList.filter(x => x !== t);
    else f.tfList.push(t);
    syncF(); renderView();
  });
  const bsAllTfs = document.getElementById('bsAllTfsBtn');
  if (bsAllTfs) bsAllTfs.onclick = (e) => {
    e.stopPropagation();
    const rect = e.target.getBoundingClientRect();
    const items = [];
    ALL_TIMEFRAMES.forEach(g => {
      items.push({ label: g.group, icon:'·' });
      g.items.forEach(([k,l]) => items.push({
        label: `${l}${f.tfList.includes(k)?' ✓':''}`, sub:k, icon: f.tfList.includes(k)?'●':'',
        onClick: () => {
          if (f.tfList.includes(k)) f.tfList = f.tfList.filter(t => t !== k);
          else f.tfList.push(k);
          syncF(); renderView();
        }
      }));
      items.push({ divider:true });
    });
    openCtxMenu(rect.left, rect.bottom + 4, items);
  };
  const bsAutoTf = document.getElementById('bsAutoDetectTf');
  if (bsAutoTf) bsAutoTf.onclick = () => {
    const fromFiles = [...new Set((S.importedFiles||[]).map(x => x.tf).filter(t => t && t !== '?'))];
    if (fromFiles.length) {
      f.tfList = [...new Set([...f.tfList, ...fromFiles])]; syncF();
      toast(`Auto-detected ${fromFiles.length} TF${fromFiles.length>1?'s':''}`, fromFiles.join(', '), 'success'); renderView();
    } else {
      toast('No imported files yet','Drop files in the Import section above to enable scan','warn');
    }
  };

  // Years slider
  const yrs = document.getElementById('bsYears'); const yrsV = document.getElementById('bsYearsV');
  if (yrs) yrs.oninput = () => { f.years = parseInt(yrs.value); yrsV.textContent = f.years + ' years'; };

  document.getElementById('bsStartBtn').onclick = () => {
    if (!f.symbolList.length || !f.tfList.length) { modal('Bootstrap requires data', '<div class="help-tip">Pick at least one symbol and one timeframe (use Auto-detect to scan local files or the broker list).</div>', [{label:'OK'}]); return; }
    syncF(); startBootstrap();
  };
  const stop = document.getElementById('bsStopBtn'); if (stop) stop.onclick = () => stopBootstrap();
  const ofb = document.getElementById('bsOpenFolderBtn'); if (ofb) ofb.onclick = () => toast('Open data folder','OS file manager would open ./data/','success');
};
let bootstrapTimer = null;
function startBootstrap() {
  S.bootstrapJob = { state:'Running', stage:'fetching', progress:0.05, bars:0, files:0, errors:0 };
  toast('Bootstrap started', `${S.bootstrapForm.pairs} · ${S.bootstrapForm.timeframes} · ${S.bootstrapForm.years}y`, 'success');
  recomputeStatusBar(); renderView();
  bootstrapTimer = setInterval(() => {
    if (!S.bootstrapJob) return;
    S.bootstrapJob.bars  += Math.floor(8000 + Math.random()*4000);
    S.bootstrapJob.files += 1;
    S.bootstrapJob.progress += 0.07 + Math.random()*0.04;
    if (S.bootstrapJob.progress >= 1.0) {
      S.bootstrapJob.progress=1.0; S.bootstrapJob.state='Succeeded'; S.bootstrapJob.stage='complete';
      clearInterval(bootstrapTimer); bootstrapTimer=null;
      toast('Bootstrap complete', `${S.bootstrapJob.bars.toLocaleString()} bars · ${S.bootstrapJob.files} files`, 'success');
    }
    recomputeStatusBar();
    if (S.activeTab==='DataBootstrap') renderView();
  }, 700);
}
function stopBootstrap() {
  if (bootstrapTimer) clearInterval(bootstrapTimer); bootstrapTimer=null;
  if (S.bootstrapJob) { S.bootstrapJob.state='Cancelled'; S.bootstrapJob.stage='user_cancelled'; }
  toast('Bootstrap cancelled','Partial files retained in cache','warn');
  recomputeStatusBar(); renderView();
}

    desc:'For regular retail or personal accounts. Conservative, sustainable risk.',
    defaults: { dailyDrawdownLimit:0.05, totalDrawdownLimit:0.20, riskPerTrade:0.01, maxLotSize:10.0, requireStopLoss:true },

  },
  propfirm: {
    name:'🏆 Prop firm challenge',
    desc:'FTMO, MyForexFunds, FundedNext, FundedPlus, FTUK style. Hard daily + total DD enforced.',
    defaults: { dailyDrawdownLimit:0.04, totalDrawdownLimit:0.07, riskPerTrade:0.01, maxLotSize:5.0, requireStopLoss:true },
    ranges: { dd:[0.01,0.05], td:[0.04,0.10], rpt:[0.005,0.02], lot:[0.01,30] },
    color: 'warn',
    advice: 'Most challenges: 4–5% daily DD · 8–10% total DD · 1–2% per trade. ALWAYS attach a stop loss — challenges void without it.',
  },
  highrisk: {
    name:'⚡ 20-pip Challenge (high risk)',
    desc:'Aggressive compounding from a small balance to a large target. Educational mode — high probability of losing the starting balance.',
    defaults: { dailyDrawdownLimit:0.50, totalDrawdownLimit:1.00, riskPerTrade:0.10, maxLotSize:50.0, requireStopLoss:false },
    ranges: { dd:[0.05,1.00], td:[0.10,1.00], rpt:[0.01,0.50], lot:[0.01,100] },

function challengeProjection(form) {
  const { startBalance, target, pipsPerDay, riskPct, winRate, tradesPerDay, leverage } = form;
  // Per-trade growth = (pipsPerDay / tradesPerDay) * lotSize * pipValue / equity = riskPct * (1 / SL_pips_in_risk)
  // Simplified: equity grows by riskPct per winning trade, shrinks by same per loss
  const winProb = winRate / 100;
  // Expected daily return = tradesPerDay * (winProb * riskPct - (1-winProb) * riskPct) = tradesPerDay * (2*winProb-1) * riskPct
  const expRet = tradesPerDay * (2*winProb - 1) * (riskPct / 100);
  if (expRet <= 0) return { days: Infinity, ruinProb: 1.0, schedule: [], expRet };
  const days = Math.log(target / startBalance) / Math.log(1 + expRet);
  // Schedule: balance every 5 days
  const schedule = [];
  let bal = startBalance, day = 0;
  while (bal < target && day < days * 1.2 && schedule.length < 30) {
    schedule.push({ day, balance: bal });
    bal *= Math.pow(1 + expRet, 5); day += 5;
  }
  schedule.push({ day: Math.ceil(days), balance: target });
  // Risk of ruin estimate (simple Kelly-style)
  const a = 1 + (riskPct/100);
  const b = 1 - (riskPct/100);
  let ruinProb;
  if (winProb === 0.5) ruinProb = 1.0;
  else {
    const q = (1 - winProb) / winProb;
    ruinProb = Math.min(1.0, Math.pow(q, Math.log(target / startBalance) / Math.log(a/b)));
  }
  return { days: Math.ceil(days), ruinProb, schedule, expRet };
}

VIEWS.Risk.afterRender = function() {
  const r = S.risk;
  document.querySelectorAll('[data-risk-prof]').forEach(c => c.onclick = () => {
    const prof = c.dataset.riskProf;
    const defs = RISK_PROFILES[prof].defaults;
    S.riskProfile = prof;
    Object.assign(r, defs);
    toast(`Profile: ${RISK_PROFILES[prof].name}`, 'Defaults applied — tune sliders below', RISK_PROFILES[prof].color);
    renderView();
  });
  const wire = (id, vid, prop, fmt) => { const el=document.getElementById(id), o=document.getElementById(vid);
    if (!el) return; el.oninput = () => { r[prop] = parseFloat(el.value); o.textContent = fmt(r[prop]); }; };
  wire('rkDd','rkDdV','dailyDrawdownLimit',fmtPct);
  wire('rkTd','rkTdV','totalDrawdownLimit',fmtPct);
  wire('rkRt','rkRtV','riskPerTrade',fmtPct);
  wire('rkLot','rkLotV','maxLotSize',v=>v.toFixed(2)+' lots');
  const sl = document.getElementById('rkSl'); if (sl) sl.onchange = e => r.requireStopLoss = e.target.checked;
  const apply = document.getElementById('rkApplyBtn');
  if (apply) apply.onclick = () => {
    const profile = RISK_PROFILES[S.riskProfile];
    let extra = '';
    if (S.riskProfile === 'highrisk') {
      const c = S.challengeForm;
      const proj = challengeProjection(c);
      extra = `<div class="section-card" style="margin:0;background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.5);">
        <h4>⚡ Challenge plan locked in</h4>
        <div class="kv-row"><span class="lbl">Start → Target</span><span class="bold">$${c.startBalance} → $${c.target.toLocaleString()} (${(c.target/c.startBalance).toFixed(0)}×)</span></div>
        <div class="kv-row"><span class="lbl">Daily expected</span><span class="bold ${proj.expRet>0?'up':'down'}" style="color:${proj.expRet>0?'var(--buy)':'var(--sell)'}">${(proj.expRet*100).toFixed(2)}%</span></div>
        <div class="kv-row"><span class="lbl">Days to target</span><span class="bold">${proj.days===Infinity?'never':proj.days+' trading days'}</span></div>
        <div class="kv-row"><span class="lbl">Probability of ruin</span><span class="bold" style="color:var(--sell);">${Math.round(proj.ruinProb*100)}%</span></div>
      </div>`;
    }
    pushNotification('Risk overrides applied', `${profile.name} · DD ${fmtPct(S.risk.dailyDrawdownLimit)} · risk ${fmtPct(S.risk.riskPerTrade)}`, profile.color === 'danger' ? 'warn' : 'success');
    modal('Risk settings applied', `
      <div class="section-card" style="margin:0;">
        <h4>${profile.name}</h4>
        <div class="muted" style="font-size:11px;margin-bottom:8px;">${escapeHtml(profile.desc)}</div>
        <div class="kv-row"><span class="lbl">Daily DD limit</span><span class="bold">${fmtPct(S.risk.dailyDrawdownLimit)}</span></div>
        <div class="kv-row"><span class="lbl">Total DD limit</span><span class="bold">${fmtPct(S.risk.totalDrawdownLimit)}</span></div>
        <div class="kv-row"><span class="lbl">Risk per trade</span><span class="bold">${fmtPct(S.risk.riskPerTrade)}</span></div>
        <div class="kv-row"><span class="lbl">Max lot size</span><span class="bold">${S.risk.maxLotSize.toFixed(2)} lots</span></div>
        <div class="kv-row"><span class="lbl">Require stop loss</span><span class="bold">${S.risk.requireStopLoss ? 'Yes — enforced' : 'No'}</span></div>
      </div>
      <div class="help-tip mt-sm">These limits are now active. The Risk Guard will block any trade exceeding them, regardless of AI signal strength or manual click.</div>
      ${extra}
    `, [{ label:'OK · Activate', kind:'primary' }]);
    toast('Risk overrides applied', profile.name, profile.color === 'danger' ? 'warn' : 'success');
  };
  const reset = document.getElementById('rkResetBtn'); if (reset) reset.onclick = () => {
    Object.assign(r, RISK_PROFILES[S.riskProfile].defaults);
    toast('Reset to defaults','','success'); renderView();
  };

  // Challenge calculator wiring (only present in highrisk mode)
  const c = S.challengeForm;
  const setNum = (id, prop) => { const el = document.getElementById(id); if (el) el.oninput = () => { c[prop] = parseFloat(el.value)||0; renderView(); }; };
  setNum('chStart','startBalance');
  setNum('chTarget','target');
  setNum('chPips','pipsPerDay');
  const wirePct = (id, vid, prop, fmt) => { const el=document.getElementById(id), o=document.getElementById(vid);
    if (!el) return;
    el.oninput = () => { c[prop] = parseFloat(el.value); o.textContent = fmt(c[prop]); };
    el.onchange = () => renderView();
  };
  wirePct('chRisk','chRiskV','riskPct',v=>v.toFixed(1)+'%');
  wirePct('chWin','chWinV','winRate',v=>v+'%');
  wirePct('chTpd','chTpdV','tradesPerDay',v=>v.toString());
};

  const ga = document.getElementById('stGate'); if (ga) ga.onchange = e => n.enabled = e.target.checked;
  document.getElementById('stApplyBtn').onclick = () => toast('Settings applied','In-memory config updated','success');
  document.getElementById('stRevertBtn').onclick = () => { toast('Reverted','Re-loaded from disk (mock)','warn'); renderView(); };
};

/* ════════════════════════════════════════════════════════════════════════════
   Renderer
   ════════════════════════════════════════════════════════════════════════════ */
function renderView() {
  const v = VIEWS[S.activeTab];
  let onboardHtml = '';
  if (S.onboarding.visible && S.onboarding.step < S.onboarding.steps.length) {
    const step = S.onboarding.steps[S.onboarding.step];
    const dots = S.onboarding.steps.map((_,i) => {
      const cls = i < S.onboarding.step ? 'done' : (i === S.onboarding.step ? 'active' : 'todo');
      return `<span class="step-dot ${cls}" title="Step ${i+1}"></span>`;
    }).join('');
    onboardHtml = `<div class="onboard" id="onboardBanner">
      <div class="num">${S.onboarding.step + 1}</div>
      <div class="body"><div class="t">${escapeHtml(step.t)}</div><div class="s">${escapeHtml(step.s)}</div></div>
      <div class="steps">${dots}</div>
      <button class="btn sm" id="onboardNextBtn">${S.onboarding.step+1===S.onboarding.steps.length?'Finish':'Next →'}</button>
      <button class="icon-btn" id="onboardCloseBtn" title="Dismiss tutorial">✕</button>
    </div>`;
  }
  if (!v) {
    document.getElementById('view').innerHTML = onboardHtml +
      `<div class="muted center" style="padding:80px;">No view registered for <span class="mono">${S.activeTab}</span></div>`;
  } else {
    document.getElementById('view').innerHTML = onboardHtml + v();
    if (typeof v.afterRender === 'function') v.afterRender();
  }
  const next = document.getElementById('onboardNextBtn');
  if (next) next.onclick = () => {
    S.onboarding.step++;
    if (S.onboarding.step >= S.onboarding.steps.length) {
      S.onboarding.visible = false;
      toast('Tutorial complete','You are ready.','success');
    }
    renderView();
  };
  const close = document.getElementById('onboardCloseBtn');
  if (close) close.onclick = () => { S.onboarding.visible = false; renderView(); };
}

document.getElementById('settingsBtn').onclick = () => navigate('Settings');
document.getElementById('searchBtn').onclick = () => openCmdK();
document.getElementById('cmdkInput').addEventListener('input', e => renderCmdK(e.target.value));
document.getElementById('cmdkBackdrop').onclick = e => { if (e.target.id==='cmdkBackdrop') closeCmdK(); };
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openCmdK(); return; }
  if (e.key === 'Escape') {
    closeCmdK();
    document.getElementById('modalBackdrop').classList.remove('on');
    document.getElementById('notifPanel').classList.remove('on');
    document.getElementById('accSelectMenu').classList.remove('on');
    closeCtxMenu();
  }
  if (document.getElementById('cmdkBackdrop').classList.contains('on')) {
    const rows = document.querySelectorAll('.cmdk-row');
    if (e.key === 'ArrowDown') { e.preventDefault(); cmdkFocus = Math.min(rows.length-1, cmdkFocus+1); refocusCmdK(); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); cmdkFocus = Math.max(0, cmdkFocus-1); refocusCmdK(); }
    if (e.key === 'Enter' && rows[cmdkFocus]) { e.preventDefault(); rows[cmdkFocus].click(); }
    return;
  }
  if (e.key === '?' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault(); document.getElementById('helpBtn').click();
  }
});

document.getElementById('runtimeBtn').onclick = (e) => {
  e.stopPropagation();
  const pop = document.getElementById('rtPopover');
  if (pop.classList.contains('on')) { pop.classList.remove('on'); return; }
  pop.innerHTML = buildRuntimePopover();
  pop.classList.add('on');
  const rb = document.getElementById('rtRefreshPop');
  if (rb) rb.onclick = () => { pop.innerHTML = buildRuntimePopover(); toast('Runtime refreshed','','success'); };
};
document.addEventListener('click', e => {
  if (!e.target.closest('#runtimeBtn') && !e.target.closest('#rtPopover'))
    document.getElementById('rtPopover').classList.remove('on');
});

let activeDocsTab = 'welcome';
function openDocs(tabKey) {
  activeDocsTab = tabKey || 'welcome';
  const lang = S.language || 'el';
  const d = DOCS[lang];
  const tabs = Object.keys(d).map(k => `<button class="btn sm ${activeDocsTab===k?'primary':'ghost'}" data-doc-tab="${k}">${d[k].title}</button>`).join('');
  modal('Documentation', `
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
      <strong style="font-size:11px;color:var(--text-muted);">${lang==='el'?'Γλώσσα':'Language'}:</strong>
      <div class="seg" id="docLangSeg">
        <button class="${lang==='el'?'active':''}" data-lang="el">🇬🇷 Ελληνικά</button>
        <button class="${lang==='en'?'active':''}" data-lang="en">🇬🇧 English</button>
      </div>
      <span class="muted" style="font-size:10px;margin-left:auto;">${lang==='el'?'Επιλεγμένη γλώσσα κατά την εγκατάσταση μπορεί να αλλάξει από Settings':'Selected at install — can be changed via Settings'}</span>
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px;">${tabs}</div>
    <div style="max-height:480px;overflow:auto;font-size:13px;line-height:1.6;">${d[activeDocsTab].body}</div>
  `, [{ label: lang==='el'?'Κλείσιμο':'Close', kind:'primary' }]);
  setTimeout(() => {
    document.querySelectorAll('[data-doc-tab]').forEach(b => b.onclick = () => { activeDocsTab = b.dataset.docTab; openDocs(activeDocsTab); });
    document.querySelectorAll('#docLangSeg [data-lang]').forEach(b => b.onclick = () => { S.language = b.dataset.lang; openDocs(activeDocsTab); });
  }, 50);
}

/* UTC clock */
function tick() {
  const d = new Date();
  document.getElementById('utc').textContent =
    `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')} UTC`;
}
tick(); setInterval(tick, 1000);
