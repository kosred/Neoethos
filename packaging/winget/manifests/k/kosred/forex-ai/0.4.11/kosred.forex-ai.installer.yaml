# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json
# Installer manifest — points at the GitHub Releases NSIS .exe asset built
# by `cargo packager --release` and uploaded by .github/workflows/release.yml.
#
# Spec: https://learn.microsoft.com/en-us/windows/package-manager/package/manifest
# Strategy ref: docs/audits/research/installer_no_paid_certs_strategy.md §1.5.1
#   "WinGet runs the actual installer binary on the user's machine (it does
#   not re-sign)" — we ship the self-signed-or-unsigned binary, WinGet
#   marks-of-the-web it but suppresses the interactive `Run anyway?` modal
#   when launched via `winget install`.

