# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json
# Installer manifest — points at the GitHub Releases ZIP asset built by
# .github/workflows/release.yml.
#
# Spec: https://learn.microsoft.com/en-us/windows/package-manager/package/manifest
# Strategy ref: docs/audits/research/installer_no_paid_certs_strategy.md §1.5.1
#   "WinGet runs the actual installer binary on the user's machine (it does
#   not re-sign)" — we ship the self-signed-or-unsigned binary, WinGet
#   marks-of-the-web it but suppresses the interactive `Run anyway?` modal
#   when launched via `winget install`.

PackageIdentifier: kosred.forex-ai
PackageVersion: 0.4.8

InstallerType: zip
NestedInstallerType: portable
NestedInstallerFiles:
  - RelativeFilePath: forex-app.exe
    PortableCommandAlias: forex-app
  - RelativeFilePath: forex-cli.exe
    PortableCommandAlias: forex-cli

InstallModes:
  - interactive
  - silent
  - silentWithProgress

UpgradeBehavior: install
Commands:
  - forex-app
  - forex-cli

ReleaseDate: 2026-05-17
Installers:
  - Architecture: x64
    InstallerType: zip
    NestedInstallerType: portable
    # Windows package-manager asset produced by
    # .github/workflows/release-installers.yml.
    InstallerUrl: https://github.com/kosred/forex-ai/releases/download/v0.4.8/forex-ai-v0.4.8-windows-x86_64.zip
    # Release-gate local artifact hash. Refresh this if the published
    # GitHub Release asset is rebuilt after tagging.
    InstallerSha256: E759C4BA7E124250A22D34AD1757403E39ECDF4EF011A5B47C1C8BA138198090
    NestedInstallerFiles:
      - RelativeFilePath: out/forex-app.exe
        PortableCommandAlias: forex-app
      - RelativeFilePath: out/forex-cli.exe
        PortableCommandAlias: forex-cli

ManifestType: installer
ManifestVersion: 1.6.0


